x-jobmonitor-common: &jobmonitor-common
  build:
    context: .
  image: jobmonitor:0.13
  env_file:
    - .env
  volumes:
    - ./data:/app/data
    - ./logs:/app/logs
  restart: unless-stopped
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true
  stop_grace_period: 60s
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  worker:
    <<: *jobmonitor-common
    container_name: jobmonitor-worker
    command: ["python", "worker.py"]
    healthcheck:
      test: ["CMD", "python", "healthcheck.py", "worker"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  profile-bot:
    <<: *jobmonitor-common
    container_name: jobmonitor-profile-bot
    command: ["python", "profile_bot.py"]
    healthcheck:
      test: ["CMD", "python", "healthcheck.py", "profile_bot"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
